bio: |
  Federica Giardina is an Assistant Professor of Biostatistics at Radboud
  University Medical Center, within the Department of Health Evidence. She is an
  infectious-disease modeller and biostatistician who uses mathematics and
  statistics to study the evolution and transmission dynamics of infectious
  diseases, with the aim of informing the design of more effective control
  interventions in public health. She is particularly interested in
  heterogeneity in infectious-disease dynamics and in informing trial design
  using individual-based stochastic models and (Bayesian) spatial statistics.

